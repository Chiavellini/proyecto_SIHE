<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del sistema - Change.org</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 2rem;
        }
        .error-icon {
            font-size: 4rem;
            color: var(--primary-red);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">Change<span class="logo-dot">.</span>org</div>
            <nav class="nav-links">
                <a href="index.html">Volver a la petición</a>
            </nav>
        </div>
    </header>

    <main class="main-container" style="justify-content: center;">
        <div class="error-container">
            <div class="error-icon">⚠️</div>
            <h1>Error inesperado</h1>
            <p>Lo sentimos, el servidor no responde en este momento. Por favor, intente más tarde.</p>
            <a href="index.html" class="btn btn-primary" style="margin-top: 1.5rem;">Regresar al inicio</a>
        </div>
    </main>
</body>
</html>
